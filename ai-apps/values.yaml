integratedAi:
  image: minsoo0919/safe-edge-ai:v6
  imagePullPolicy: IfNotPresent
  preferredNode: worker2
  tolerationSeconds: 30
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1500Mi
    limits:
      cpu: 2000m
      memory: 2000Mi
  cleanupResources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  snapshotStorage:
    enabled: true
    claimName: safe-edge-ai-snapshots
    storageClassName: longhorn
    size: 5Gi
    mountPath: /app/snapshots
    retentionHours: 24
    cleanupIntervalSeconds: 3600
    cleanupImage: busybox:1.36

audio:
  image: minsoo0919/safe-edge-audio:v2
  imagePullPolicy: IfNotPresent
  preferredNode: worker2
  tolerationSeconds: 30
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 1500Mi
    limits:
      cpu: 1000m
      memory: 2000Mi

imagePrepull:
  enabled: true
  nodes:
    - worker1
    - worker2
  pauseImage: registry.k8s.io/pause:3.10
