apiVersion: apps/v1
kind: Deployment
metadata:
  name: safe-edge-integrated-ai
  namespace: ai-apps
  labels:
    app: safe-edge-integrated-ai
spec:
  replicas: {{ .Values.integratedAi.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: safe-edge-integrated-ai
  template:
    metadata:
      labels:
        app: safe-edge-integrated-ai
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - {{ .Values.integratedAi.preferredNode }}
      tolerations:
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: {{ .Values.integratedAi.tolerationSeconds }}
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: {{ .Values.integratedAi.tolerationSeconds }}
      containers:
      - name: ai-processor
        image: {{ .Values.integratedAi.image }}
        imagePullPolicy: {{ .Values.integratedAi.imagePullPolicy }}
        resources:
{{ toYaml .Values.integratedAi.resources | indent 10 }}
        securityContext:
          privileged: true
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        volumeMounts:
        - name: dev-dir
          mountPath: /dev
        - name: udev-dir
          mountPath: /run/udev
        {{- if .Values.integratedAi.snapshotStorage.enabled }}
        - name: snapshot-storage
          mountPath: {{ .Values.integratedAi.snapshotStorage.mountPath }}
        {{- end }}
      {{- if .Values.integratedAi.snapshotStorage.enabled }}
      - name: snapshot-cleanup
        image: {{ .Values.integratedAi.snapshotStorage.cleanupImage }}
        imagePullPolicy: IfNotPresent
        resources:
{{ toYaml .Values.integratedAi.cleanupResources | indent 10 }}
        env:
        - name: SNAPSHOT_DIR
          value: {{ .Values.integratedAi.snapshotStorage.mountPath | quote }}
        - name: RETENTION_MINUTES
          value: {{ mul .Values.integratedAi.snapshotStorage.retentionHours 60 | quote }}
        - name: CLEANUP_INTERVAL_SECONDS
          value: {{ .Values.integratedAi.snapshotStorage.cleanupIntervalSeconds | quote }}
        command:
        - sh
        - -c
        - |
          while true; do
            find "$SNAPSHOT_DIR" -type f \( -name '*.jpg' -o -name '*.jpeg' -o -name '*.png' \) -mmin +"$RETENTION_MINUTES" -exec rm -f {} \;
            sleep "$CLEANUP_INTERVAL_SECONDS"
          done
        volumeMounts:
        - name: snapshot-storage
          mountPath: {{ .Values.integratedAi.snapshotStorage.mountPath }}
      {{- end }}
      volumes:
      - name: dev-dir
        hostPath:
          path: /dev
      - name: udev-dir
        hostPath:
          path: /run/udev
      {{- if .Values.integratedAi.snapshotStorage.enabled }}
      - name: snapshot-storage
        {{- if eq .Values.integratedAi.snapshotStorage.type "hostPath" }}
        hostPath:
          path: {{ .Values.integratedAi.snapshotStorage.hostPath }}
          type: DirectoryOrCreate
        {{- else }}
        persistentVolumeClaim:
          claimName: {{ .Values.integratedAi.snapshotStorage.claimName }}
        {{- end }}
      {{- end }}
