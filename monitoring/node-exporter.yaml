apiVersion: apps/v1
kind: DaemonSet # 🚨 모든 노드에 하나씩 무조건 띄우기 위한 컨트롤러
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true # 호스트(노드)의 실제 네트워크 지표를 수집하기 위해 필수
      hostPID: true     # 호스트(노드)의 실제 프로세스 지표를 수집하기 위해 필수
      
      # 💡 핵심: 마스터 노드의 Taint를 무시하고 배포되도록 허용하는 설정
      tolerations:
      - operator: "Exists" 

      containers:
      - name: node-exporter
        image: prom/node-exporter:latest
        imagePullPolicy: IfNotPresent
        args:
        - --path.procfs=/host/proc
        - --path.sysfs=/host/sys
        - --path.rootfs=/host/root
        ports:
        - containerPort: 9100
          hostPort: 9100
          name: metrics
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: root
          mountPath: /host/root
          readOnly: true
      
      # 노드의 실제 하드웨어 상태 폴더들을 컨테이너 안으로 연결
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: root
        hostPath:
          path: /

---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter-svc
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  clusterIP: None # 💡 Headless 서비스: 프로메테우스가 각 노드의 IP로 직접 찾아가도록 설정
  ports:
  - port: 9100
    targetPort: 9100
    name: metrics
  selector:
    app: node-exporter
